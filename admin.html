<!DOCTYPE html>

<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Dashboard khảo sát</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7fb;
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#fff;
padding:20px;
margin-bottom:20px;
border-radius:12px;
box-shadow:0 2px 8px rgba(0,0,0,.08);
}

h1,h2{
margin-top:0;
}

button{
background:#2563eb;
color:white;
border:none;
padding:12px 18px;
border-radius:8px;
cursor:pointer;
}

.rank{
padding:10px;
margin-bottom:8px;
background:#f3f4f6;
border-radius:8px;
}

.user{
padding:8px 0;
border-bottom:1px solid #eee;
}

.error{
background:#fee2e2;
padding:10px;
border-radius:8px;
color:#991b1b;
white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="card">

<h1>📊 Dashboard khảo sát</h1>

<button onclick="loadData()">
🔄 Làm mới
</button>

</div>

<div class="card">

<h2>👥 Tổng số người tham gia</h2>

<div id="totalUsers">
Đang tải...
</div>

</div>

<div class="card">

<h2>🏆 Top khung giờ</h2>

<div id="topSlots">
Đang tải...
</div>

</div>

<div class="card">

<h2>📋 Danh sách người tham gia</h2>

<div id="userList">
Đang tải...
</div>

</div>

<div class="card">

<h2>🛠 Debug</h2>

<div id="debug">
-
</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwyXy8Lk2XGSj_1kADn5J80CIGtFwwiOQ6uhWhqttFE/exec";

async function loadData(){

try{

document.getElementById("debug").innerHTML =
"Đang tải dữ liệu...";

const response =
await fetch(API_URL);

const text =
await response.text();

document.getElementById("debug").innerHTML =
text.substring(0,500);

const data =
JSON.parse(text);

document.getElementById("totalUsers").innerHTML =
"<strong>" +
data.length +
"</strong> người";

let usersHTML = "";

let slotCounter = {};

for(let i=0;i<data.length;i++){

const item = data[i];

usersHTML +=
'<div class="user">✅ '
+
(item.Name || "Không tên")
+
'</div>';

if(item.Availability){

try{

const slots =
JSON.parse(
item.Availability
);

for(let j=0;j<slots.length;j++){

const slot =
slots[j];

const key =
slot.day +
" " +
slot.period;

slotCounter[key] =
(slotCounter[key] || 0)
+ 1;

}

}
catch(err){

console.log(err);

}

}

}

document.getElementById(
"userList"
).innerHTML =
usersHTML;

const sorted =
Object.entries(
slotCounter
)
.sort(
(a,b)=>
b[1]-a[1]
);

let topHTML="";

for(
let i=0;
i<sorted.length && i<10;
i++
){

const item =
sorted[i];

let icon="🏅";

if(i===0) icon="🥇";
if(i===1) icon="🥈";
if(i===2) icon="🥉";

topHTML +=

'<div class="rank">'

+ icon

+ ' '

+ item[0]

+ ' — '

+ item[1]

+ ' phiếu'

+ '</div>';

}

if(topHTML===""){

topHTML =
"Chưa có dữ liệu";

}

document.getElementById(
"topSlots"
).innerHTML =
topHTML;

}
catch(error){

document.getElementById(
"debug"
).innerHTML =

'<div class="error">'

+ error

+ '</div>';

console.error(error);

}

}

loadData();

</script>

</body>
</html>
