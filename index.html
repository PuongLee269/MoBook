<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Khảo sát lịch học</title>
<style>
:root{font-family:Arial,sans-serif;color:#172033;background:#f5f7fb}
*{box-sizing:border-box}
body{max-width:900px;margin:auto;padding:20px}
.card{background:#fff;padding:22px;margin-bottom:20px;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
h1,h2{margin-top:0}
label{display:block;margin-top:14px;font-weight:700}
input[type=text],select{width:100%;padding:12px;font-size:16px;border:1px solid #d7dce5;border-radius:8px;margin-top:8px;background:#fff}
.rating{margin-bottom:20px}
.star{font-size:34px;cursor:pointer;color:#d7dce5;user-select:none}
.star.active{color:#ffb400}
button{padding:14px 20px;border:0;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer;font-size:15px;font-weight:700}
button:hover{opacity:.9}
button:disabled{opacity:.55;cursor:not-allowed}
button.secondary{background:#fff;color:#2563eb;border:1px solid #2563eb}
table{width:100%;border-collapse:collapse}
th,td{border:1px solid #ddd;padding:10px;text-align:center}
.slot{width:22px;height:22px}
.hidden{display:none!important}
.notice{padding:12px;background:#fff7ed;border:1px solid #fdba74;border-radius:8px;color:#9a3412;margin-top:14px}
.success{padding:20px;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:10px;color:#065f46;font-size:18px}
.rank{display:flex;justify-content:space-between;gap:12px;padding:12px;margin-top:9px;background:#fff;border:1px solid #d1fae5;border-radius:8px;color:#172033;font-size:16px}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}
.small{font-size:13px;color:#64748b;margin-top:7px}
</style>
</head>
<body>
<div id="identityCard" class="card">
<h1>📅 Khảo sát lịch học</h1>
<p>Vui lòng cho biết thời gian bạn thường rảnh.</p>
<label for="userName">👤 Tên của bạn</label>
<input id="userName" type="text" autocomplete="name" placeholder="Nhập họ và tên">
<div id="classField" class="hidden">
<label for="classCode">🏫 Mã lớp</label>
<select id="classCode"></select>
<div id="classHint" class="small"></div>
</div>
<div id="backendNotice" class="notice hidden"></div>
</div>

<div id="ratingCard" class="card">
<h2>⭐ Mức độ rảnh</h2>
<div class="rating"><div>🌅 Sáng</div><div id="morningStars"></div></div>
<div class="rating"><div>🌤️ Chiều</div><div id="afternoonStars"></div></div>
<div class="rating"><div>🌙 Tối</div><div id="eveningStars"></div></div>
<button id="continueBtn" type="button">Tiếp tục</button>
</div>

<div id="scheduleCard" class="card hidden">
<h2>✏️ Tinh chỉnh lịch</h2>
<p>Bỏ chọn những buổi bạn thường bận.</p>
<table>
<thead><tr><th></th><th>🌅</th><th>🌤️</th><th>🌙</th></tr></thead>
<tbody id="scheduleBody"></tbody>
</table>
<div class="actions">
<button id="submitBtn" type="button">📨 Gửi khảo sát</button>
</div>
</div>

<div id="successCard" class="card hidden">
<div class="success">
<h2>🎉 Cảm ơn bạn!</h2>
<p id="successMessage">Khảo sát đã được ghi nhận thành công.</p>
<h2>🏆 Top 5 buổi được bình chọn nhiều nhất</h2>
<div id="topFive"></div>
<div class="actions">
<button id="refillBtn" class="secondary" type="button">Điền lại</button>
</div>
</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxG0nbhcXiYmnBBEnt2yHNi6nNIMsSPCOIs3aMLXbIKEVCzHTjia2VgY_-TfOhRqrOi1Q/exec";
const days = ["T2","T3","T4","T5","T6","T7","CN"];
const ratings = {morning:1,afternoon:1,evening:1};
let backendReady = false;
let classConfigs = [];

function showNotice(message){
  const box=document.getElementById("backendNotice");
  box.textContent=message;
  box.classList.toggle("hidden",!message);
}

async function requestJson(url,options){
  const response=await fetch(url,options);
  const text=await response.text();
  try{return JSON.parse(text)}catch(error){throw new Error("Phản hồi máy chủ không hợp lệ")}
}

async function loadClasses(){
  try{
    const data=await requestJson(API_URL+"?action=config&t="+Date.now());
    if(data&&data.version>=2&&Array.isArray(data.classes)){
      backendReady=true;
      classConfigs=data.classes.filter(function(item){return item.active!==false});
      const select=document.getElementById("classCode");
      select.innerHTML="";
      classConfigs.forEach(function(item){
        const option=document.createElement("option");
        option.value=item.code;
        option.textContent=item.code+" — "+(item.frequency==="monthly"?"Điền hàng tháng":"Điền hàng tuần");
        select.appendChild(option);
      });
      document.getElementById("classField").classList.remove("hidden");
      updateClassHint();
      if(!classConfigs.length){
        showNotice("Chưa có mã lớp hoạt động. Vui lòng liên hệ quản trị viên.");
        document.getElementById("continueBtn").disabled=true;
      }
      return;
    }
    showNotice("Hệ thống đang dùng chế độ cũ. Quản trị viên cần cập nhật Apps Script để bật mã lớp và giới hạn lượt điền.");
  }catch(error){
    showNotice("Chưa tải được cấu hình mã lớp. Bạn vẫn có thể dùng biểu mẫu hiện tại.");
  }
}

function updateClassHint(){
  const code=document.getElementById("classCode").value;
  const config=classConfigs.find(function(item){return item.code===code});
  document.getElementById("classHint").textContent=config
    ? (config.frequency==="monthly"?"Mỗi người được gửi 1 lần trong tháng.":"Mỗi người được gửi 1 lần trong tuần.")
    : "";
}

function paintStars(containerId,key){
  const container=document.getElementById(containerId);
  container.innerHTML="";
  for(let i=1;i<=5;i++){
    const star=document.createElement("span");
    star.className="star"+(i<=ratings[key]?" active":"");
    star.textContent="★";
    star.setAttribute("role","button");
    star.setAttribute("aria-label",i+" sao");
    star.addEventListener("click",function(){
      ratings[key]=i;
      Array.from(container.children).forEach(function(item,index){
        item.classList.toggle("active",index<i);
      });
    });
    container.appendChild(star);
  }
}

async function generateSchedule(){
  const name=document.getElementById("userName").value.trim();
  const classCode=backendReady?document.getElementById("classCode").value:"";
  if(!name){alert("Vui lòng nhập tên");return}
  if(backendReady&&!classCode){alert("Vui lòng chọn mã lớp");return}

  const button=document.getElementById("continueBtn");
  button.disabled=true;
  try{
    if(backendReady){
      const url=API_URL+"?action=eligibility&name="+encodeURIComponent(name)+"&classCode="+encodeURIComponent(classCode)+"&t="+Date.now();
      const status=await requestJson(url);
      if(!status.allowed){
        alert(status.message||"Bạn đã điền lịch trong kỳ hiện tại.");
        return;
      }
    }
    const body=document.getElementById("scheduleBody");
    body.innerHTML="";
    days.forEach(function(day){
      const row=document.createElement("tr");
      row.innerHTML='<td>'+day+'</td>'
        +'<td><input class="slot" type="checkbox" data-day="'+day+'" data-period="Sáng" '+(ratings.morning>=3?"checked":"")+'></td>'
        +'<td><input class="slot" type="checkbox" data-day="'+day+'" data-period="Chiều" '+(ratings.afternoon>=3?"checked":"")+'></td>'
        +'<td><input class="slot" type="checkbox" data-day="'+day+'" data-period="Tối" '+(ratings.evening>=3?"checked":"")+'></td>';
      body.appendChild(row);
    });
    document.getElementById("scheduleCard").classList.remove("hidden");
    document.getElementById("scheduleCard").scrollIntoView({behavior:"smooth"});
  }catch(error){
    alert("Không thể kiểm tra lượt điền: "+error.message);
  }finally{
    button.disabled=false;
  }
}

function countTopSlots(records,classCode){
  const counter={};
  (records||[]).forEach(function(item){
    if(classCode&&item.ClassCode&&String(item.ClassCode).toUpperCase()!==classCode.toUpperCase())return;
    let slots=item.Availability||item.availability||[];
    if(typeof slots==="string"){
      try{slots=JSON.parse(slots)}catch(error){slots=[]}
    }
    slots.forEach(function(slot){
      const key=slot.day+" "+slot.period;
      counter[key]=(counter[key]||0)+1;
    });
  });
  return Object.keys(counter).map(function(key){return {slot:key,votes:counter[key]}})
    .sort(function(a,b){return b.votes-a.votes||a.slot.localeCompare(b.slot,"vi")}).slice(0,5);
}

function renderTopFive(items){
  const target=document.getElementById("topFive");
  target.innerHTML="";
  if(!items||!items.length){
    target.textContent="Chưa có đủ dữ liệu bình chọn.";
    return;
  }
  const medals=["🥇","🥈","🥉","🏅","🏅"];
  items.slice(0,5).forEach(function(item,index){
    const row=document.createElement("div");
    row.className="rank";
    const label=document.createElement("span");
    const votes=document.createElement("strong");
    label.textContent=medals[index]+" "+(item.slot||item.name||"");
    votes.textContent=(item.votes||item.count||0)+" phiếu";
    row.appendChild(label);
    row.appendChild(votes);
    target.appendChild(row);
  });
}

async function submitVote(){
  const name=document.getElementById("userName").value.trim();
  const classCode=backendReady?document.getElementById("classCode").value:"";
  const availability=[];
  document.querySelectorAll(".slot:checked").forEach(function(box){
    availability.push({day:box.dataset.day,period:box.dataset.period});
  });
  if(!availability.length){alert("Vui lòng chọn ít nhất một buổi rảnh");return}

  const button=document.getElementById("submitBtn");
  button.disabled=true;
  button.textContent="Đang gửi...";
  try{
    const result=await requestJson(API_URL,{
      method:"POST",
      body:JSON.stringify({
        action:"submit",
        name:name,
        classCode:classCode,
        morning:ratings.morning,
        afternoon:ratings.afternoon,
        evening:ratings.evening,
        availability:availability
      })
    });
    if(result&&result.success===false)throw new Error(result.message||"Không thể gửi khảo sát");

    let topSlots=result&&Array.isArray(result.topSlots)?result.topSlots:null;
    if(!topSlots){
      const records=await requestJson(API_URL+"?t="+Date.now());
      topSlots=countTopSlots(Array.isArray(records)?records:records.responses,classCode);
    }
    renderTopFive(topSlots);
    document.getElementById("successMessage").textContent=result&&result.periodLabel
      ? "Khảo sát đã được ghi nhận cho "+result.periodLabel+"."
      : "Khảo sát đã được ghi nhận thành công.";
    document.getElementById("identityCard").classList.add("hidden");
    document.getElementById("ratingCard").classList.add("hidden");
    document.getElementById("scheduleCard").classList.add("hidden");
    document.getElementById("successCard").classList.remove("hidden");
    document.getElementById("successCard").scrollIntoView({behavior:"smooth"});
  }catch(error){
    alert(error.message||"Gửi dữ liệu thất bại");
  }finally{
    button.disabled=false;
    button.textContent="📨 Gửi khảo sát";
  }
}

function resetForm(){
  document.getElementById("userName").value="";
  ratings.morning=1;ratings.afternoon=1;ratings.evening=1;
  paintStars("morningStars","morning");
  paintStars("afternoonStars","afternoon");
  paintStars("eveningStars","evening");
  document.getElementById("scheduleBody").innerHTML="";
  document.getElementById("successCard").classList.add("hidden");
  document.getElementById("scheduleCard").classList.add("hidden");
  document.getElementById("identityCard").classList.remove("hidden");
  document.getElementById("ratingCard").classList.remove("hidden");
  window.scrollTo({top:0,behavior:"smooth"});
}

document.getElementById("continueBtn").addEventListener("click",generateSchedule);
document.getElementById("submitBtn").addEventListener("click",submitVote);
document.getElementById("refillBtn").addEventListener("click",resetForm);
document.getElementById("classCode").addEventListener("change",updateClassHint);
paintStars("morningStars","morning");
paintStars("afternoonStars","afternoon");
paintStars("eveningStars","evening");
loadClasses();
</script>
</body>
</html>
